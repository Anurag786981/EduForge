<header class="dashboard-header">

    <!-- Left Section -->

    <div class="dashboard-header-left">

        <button
            class="menu-button"
            (click)="onMenuClick()">

            <mat-icon>menu</mat-icon>

        </button>

        <div class="logo-container">

            <mat-icon class="logo-icon">

                school

            </mat-icon>

            <span class="logo-text">

                {{ appName }}

            </span>

        </div>

    </div>


    <!-- Center Section -->

    <div class="dashboard-header-center">

        <div class="search-box">

            <mat-icon>

                search

            </mat-icon>

            <input
                type="text"
                placeholder="Search students, classes, assignments..." />

        </div>

    </div>


    <!-- Right Section -->

    <div class="dashboard-header-right">

        <button class="icon-button">

            <mat-icon>

                notifications

            </mat-icon>

        </button>

        <button class="icon-button">

            <mat-icon>

                mail

            </mat-icon>

        </button>

        <div class="profile">

            <mat-icon>

                account_circle

            </mat-icon>

            <span>

                {{ userName }}

            </span>

            <mat-icon>

                expand_more

            </mat-icon>

        </div>

    </div>

</header>
